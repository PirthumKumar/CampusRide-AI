services:
  - type: web
    name: campus-ride
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn campus_ride.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: campus-ride-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: campus-ride-db
    databaseName: campusridedb
    user: campusrideuser
    plan: free
